<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:description" content="Explora mi colección de partituras y composiciones musicales.">
    <link href="./img/Sk.png" rel="icon">
    <title>SKores | Biblioteca de Partituras</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>
    <script>
        // Fallback local loader: si la librería no se cargó desde CDN, cargar la copia local
        (function(){
            function loadLocal() {
                if (typeof alphaTab !== 'undefined') return;
                var s = document.createElement('script');
                s.src = 'alphaTab.min.js';
                s.onload = function(){ console.info('alphaTab loaded from local copy'); };
                s.onerror = function(){ console.error('Failed to load local alphaTab fallback'); };
                document.head.appendChild(s);
            }

            // Si el CDN script ya falló, alphaTab estará undefined. Esperamos un tick y comprobamos.
            setTimeout(function(){ if (typeof alphaTab === 'undefined') loadLocal(); }, 50);
        })();
    </script>
    
    <style>
        :root {
            --bg: #0a0b0e;
            --sidebar-bg: #0f1115;
            --panel: #161920;
            --accent: #e63946;
            --text: #f1f1f1;
            --subtext: #64748b;
            --border: #242933;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 30px 0 10px;
            text-align: center;
            width: 100%;
        }

        header h1 {
            font-size: clamp(1rem, 4vw, 1.2rem);
            letter-spacing: clamp(1px, 2vw, 5px);
            text-transform: uppercase;
            font-weight: 900;
            color: var(--text);
            margin: 0;
            opacity: 0.8;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        /* --- PANEL DE CONTROL --- */
        .master-panel {
            background: var(--panel);
            width: 95%;
            max-width: 1100px;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 20px auto; /* center with horizontal margins */
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-main {
            background: #2d333f;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-main:hover {
            background: #3d4452;
            transform: translateY(-2px);
        }

        #play-pause-btn {
            background: var(--accent);
            min-width: 90px;
        }

        #play-pause-btn:hover {
            background: #ff4d5a;
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.4);
        }

        /* --- BARRA DE INSTRUMENTOS --- */
        .instrument-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 0 8px; /* margen lateral para separar del resto del panel */
        }

        .btn-inst {
            background: transparent;
            border: 1px solid #3d4452;
            color: var(--subtext);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-inst:hover {
            border-color: var(--subtext);
            color: var(--text);
        }

        .btn-inst.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
            font-weight: 700;
        }

        /* --- ALPHATAB --- */
        #alphaTab {
            width: 95%;
            max-width: 1100px;
            margin-bottom: 80px;
            border-radius: 8px;
            overflow: hidden;
            background: white; /* Importante para que la partitura sea legible */
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* --- LOADER --- */
        #loader-container {
            padding: 60px;
            text-align: center;
            color: var(--subtext);
        }

        .spinner {
            margin: 0 auto 20px;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- FOOTER FLOTANTE --- */
        .sticky-footer {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(22, 25, 32, 0.9);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
        }

        .quick-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--subtext);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .btn-footer {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }

        @media (max-width: 768px) {
            .master-panel {
                flex-direction: column;
                width: 100%;
                border-radius: 0;
                top: 0;
            }
            #alphaTab { width: 100%; }
        }
        /* Score Area - AlphaTab */
 
        /* --- ALPHATAB & CURSOR VISUAL --- */
        #alphaTab {
            position: relative;  /* INDISPENSABLE para la barra roja */
            width: 95%;
            max-width: 1100px;
            margin-bottom: 80px;
            border-radius: 8px;
            overflow: auto; /* Permite scroll si la partitura es alta */
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            min-height: 260px;
            display: block;
            max-height: calc(100vh - 220px); /* Mantener visible el panel de controles */
        }

   /* Mejora del cursor para que destaque sobre el blanco de la partitura */
.at-cursor-bar {
    background: #e63946 !important; /* Rojo sólido */
    width: 3px !important;
    opacity: 0.9 !important;
    z-index: 1000 !important;
    pointer-events: none;
    box-shadow: 0 0 8px rgba(230, 57, 70, 0.5); /* Sutil brillo rockero */
}

/* Forzar que el canvas de AlphaTab ocupe todo el ancho y se redimensione */
.at-canvas {
    width: 100% !important;
    height: auto !important;
}

/* Estado visual del botón de bloqueo en el footer */
.btn-footer.active {
    color: var(--accent);
    text-shadow: 0 0 10px rgba(230, 57, 70, 0.4);
}

        /* --- RESPONSIVO --- */
        @media (max-width: 768px) {
            .master-panel {
                flex-direction: column;
                width: calc(100% - 24px);
                border-radius: 8px;
                top: 12px; /* mantener pequeño margen superior en móvil */
                margin: 12px auto !important; /* forzar margen horizontal en móviles */
                padding-left: 12px;
                padding-right: 12px;
            }
            #alphaTab { width: 100%; border-radius: 0; }
            .instrument-bar { margin: 8px 0 0 0; } /* margen vertical en móvil */
        }
        @media (max-width: 420px) {
            .sticky-footer {
                right: 12px;
                bottom: 12px;
                padding: 6px 10px;
            }
            .master-panel { padding: 8px; }
            #loader-container { padding: 24px; }
        }
        /* Force range sliders to use accent red in this document (covers browsers not affected by global CSS) */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 100%);
            border-radius: 6px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: -4px;
            box-shadow: 0 0 0 3px rgba(230,57,70,0.14);
        }
        input[type="range"]::-moz-range-track { background: var(--accent); height:6px; border-radius:6px; }
        input[type="range"]::-moz-range-thumb { background: var(--accent); width:14px; height:14px; border-radius:50%; }
        input[type="range"]::-moz-range-progress { background: var(--accent); height:6px; }
        input[type="range"]::-ms-fill-lower { background: var(--accent); }
        input[type="range"] { accent-color: var(--accent); }

        /* --- BARRA DE INSTRUMENTOS JUSTIFICADA --- */
/* --- PANEL PRINCIPAL --- */
.master-panel {
    display: flex;
    flex-direction: column;
    width: 95%;
    max-width: 1100px;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin: 20px auto;
    background: var(--panel);
}

/* --- FILA SUPERIOR (PLAY/STOP/VOLUMEN) --- */
.top-row {
    display: flex;
    gap: 20px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 15px;
    margin-bottom: 15px;
}

/* --- LISTA DE PISTAS (GRID) --- */
#track-list {
    display: grid;
    /* Crea columnas automáticas. Ajusta 300px si quieres que sean más estrechas */
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
    width: 100%;
}

/* Cada fila de instrumento es su propio Grid interno */
.instrument-row {
    display: grid;
    grid-template-columns: 140px 1fr; /* 140px botón, resto slider */
    align-items: center;
    gap: 10px;
    padding: 5px;
}

.btn-instrument {
    background: #2D333F;
    color: #FFFFFF;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.slider {
    width: 100%;
}
    </style>
</head>
<body>
    <script src="https://kit.fontawesome.com/f9aed43b4b.js" crossorigin="anonymous"></script>

    <header>
        <h1>Skores</h1>
    </header>

<div class="master-panel">
    <div class="top-row">
        <a href="index.html" class="btn-main">INICIO</a>
        <div class="control-group">
            <button class="btn-main" id="play-pause-btn"><i class="fa-solid fa-play"></i></button>
            <button class="btn-main" id="stop-btn"><i class="fa-solid fa-stop"></i></button>
        </div>
        <div class="control-group">
            <label>Volumen Maestro:</label>
            <input type="range" id="master-volume-slider" min="0" max="100" value="100">
        </div>
    </div>

    <div class="instrument-bar" id="track-list">
        </div>
</div>

    <div id="loader-container">
        <div class="spinner"></div>
        <p id="loading-text">Exportando desde muy lejano...</p>
    </div>

    <div id="alphaTab"></div>

    <div class="sticky-footer">
        <div class="quick-controls">
            <button class="btn-footer" id="lock-scroll-footer" title="Fijar Vista">🔓</button>
            <span class="footer-label">Auto-Scroll</span>
        </div>
    </div>

    <script src="main.js" type="text/javascript"></script>
</body>
</html>
